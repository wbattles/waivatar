image:
  data:
    repository: ghcr.io/wbattles/waivatar-data
    tag: latest
  mcp:
    repository: ghcr.io/wbattles/waivatar-mcp
    tag: latest

qdrant:
  enabled: true
  image: qdrant/qdrant
  tag: latest
  port: 6333
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""

mcp:
  replicas: 1
  port: 8080
  openai:
    model: text-embedding-3-small

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  host: mcp.example.com
  tls:
    enabled: false
    secretName: ""

secrets:
  openaiApiKey: ""
  qdrantApiKey: ""

job:
  backoffLimit: 4
