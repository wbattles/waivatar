name: waivatar docker images

on:
  push:
    branches:
      - main
      - test
    paths:
      - app/**
      - data/**
      - Dockerfile.*
      - requirements.txt
      - .github/workflows/docker.yaml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: waivatar-mcp
            dockerfile: Dockerfile.mcp
          - image: waivatar-data
            dockerfile: Dockerfile.data
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:latest" >> "$GITHUB_OUTPUT"
          echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
